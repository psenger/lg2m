name: Feature Request
description: Propose a new feature or enhancement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Read [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) and
        [`docs/design.md`](../blob/main/docs/design.md) before filing — the design is
        settled, and new work should fit the existing architecture. Open this issue
        before writing any code so the approach can be discussed.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or limitation you are hitting. Focus on the "why", not the solution.
      placeholder: When I have a graph with … there is no way to …
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like to see this solved? A rough sketch is fine.
    validations:
      required: true

  - type: textarea
    id: design-fit
    attributes:
      label: How does this fit the design in docs/design.md?
      description: |
        Point to the section(s) of `docs/design.md` most relevant to this change, or
        explain why the design does not currently cover it. This is especially important
        for changes to the IR, the routing model, the parser, or the framework boundary.
      placeholder: "This touches the routing model (docs/design.md Section 3) because …"

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you ruled them out.

  - type: checkboxes
    id: roadmap
    attributes:
      label: Roadmap check
      description: Is this already on the roadmap in the README?
      options:
        - label: I have checked the [Status and roadmap](https://github.com/psenger/langgraph_to_from_mermaid#status-and-roadmap) section and this is not already listed.
          required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Code snippets, diagram examples, links to prior art, or anything else that helps frame the request.
